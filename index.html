```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pajalnik 72</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow-x:hidden;
    background:#f4f4f4;
    color:black;
}

/* Фон */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    background:
    linear-gradient(rgba(255,255,255,0.65), rgba(255,255,255,0.7)),
    url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* Дым */
.smoke{
    position:absolute;
    width:250px;
    height:250px;
    background:radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%);
    filter:blur(35px);
    animation:smoke 6s infinite ease-in-out;
    left:42%;
    top:50%;
}

@keyframes smoke{
    0%{
        transform:translateY(0) scale(1);
        opacity:0.3;
    }
    50%{
        transform:translateY(-60px) scale(1.4);
        opacity:0.1;
    }
    100%{
        transform:translateY(-120px) scale(1.7);
        opacity:0;
    }
}

/* Контент */
.content{
    position:relative;
    z-index:2;
    backdrop-filter:blur(8px);
    background:rgba(255,255,255,0.25);
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 35px rgba(0,0,0,0.15);
}

/* Заголовок */
.logo{
    font-size:72px;
    color:red;
    font-weight:bold;
    text-shadow:
    0 0 10px rgba(255,0,0,0.7),
    0 0 20px rgba(255,0,0,0.4);
    margin-bottom:15px;
}

/* Подпись */
.subtitle{
    font-size:18px;
    margin-bottom:35px;
    color:black;
}

/* Кнопки */
.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    background:black;
    color:red;
    border:none;
    padding:16px 28px;
    font-size:16px;
    border-radius:14px;
    cursor:pointer;
    transition:0.35s;
    box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

button:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:
    0 0 15px rgba(255,0,0,0.4),
    0 8px 25px rgba(0,0,0,0.35);
}

/* Блоки */
.section{
    display:none;
    background:white;
    margin:30px auto;
    width:85%;
    max-width:900px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    animation:fade 0.4s ease;
}

.section.active{
    display:block;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Подъемник */
.lift{
    position:absolute;
    right:5%;
    bottom:0;
    width:80px;
    height:220px;
    background:rgba(0,0,0,0.15);
    border-radius:10px;
}

/* Свет */
.light{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle, rgba(255,255,255,0.45), transparent 70%);
    top:-150px;
    left:-100px;
}

/* Адаптив */
@media(max-width:768px){

.logo{
    font-size:48px;
}

.content{
    width:90%;
    padding:25px;
}

button{
    width:100%;
}

}

</style>
</head>
<body>

<div class="hero">

    <div class="light"></div>
    <div class="smoke"></div>
    <div class="lift"></div>

    <div class="content">

        <div class="logo">Pajalnik 72</div>

        <div class="subtitle">
            Ремонт ECU / ABS / AirBag / сигнализаций / брелоков
        </div>

        <div class="buttons">

            <button onclick="showSection('price')">
                Прайс услуг
            </button>

            <button onclick="showSection('location')">
                Как найти
            </button>

            <button onclick="showSection('contacts')">
                Контактные данные
            </button>

        </div>

    </div>

</div>

<div id="price" class="section">
    <h2>Прайс услуг</h2>
    <p>Здесь позже добавится стоимость ремонта и диагностики.</p>
</div>

<div id="location" class="section">
    <h2>Как найти</h2>
    <p>Здесь позже появится карта и адрес мастерской.</p>
</div>

<div id="contacts" class="section">
    <h2>Контактные данные</h2>
    <p>Телефон, WhatsApp, Telegram и другие контакты появятся позже.</p>
</div>

<script>

function showSection(id){

    let sections = document.querySelectorAll('.section');

    sections.forEach(section=>{
        section.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');

    window.scrollTo({
        top:document.getElementById(id).offsetTop - 40,
        behavior:'smooth'
    });

}

</script>

</body>
</html>
```
